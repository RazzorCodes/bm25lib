version: 1
repo:
  name: bm25
  owner: RazzorCodes
  repo: bm25lib

providers:
  drone:
    kind: drone
    endpoint: http://drone.kube-ex.svc.cluster.local
    owner: RazzorCodes
    repo: bm25lib
    auth:
      token:
        secretRef:
          namespace: drone
          name: token
          key: value
      github_token:
        secretRef:
          namespace: github
          name: coralforge-bm25-pat
          key: github_token

run_types:
  ci:
    default_provider: drone
    provider_target:
      pipeline: bm25-ci
    trigger:
      mode: automatic
      branches: [main, "release/*"]
    stages:
      - name: build
        provider: drone
        target: {pipeline: bm25-ci, step: build}
        runner: docker
      - name: test
        provider: drone
        target: {pipeline: bm25-ci, step: test}
        depends_on: [build]
        runner: docker
      - name: lint
        provider: drone
        target: {pipeline: bm25-ci, step: lint}
        depends_on: [build]
        runner: docker

  release:
    default_provider: drone
    provider_target:
      pipeline: bm25-release
      tag_prefix: release-
    trigger:
      mode: manual
    stages:
      - name: release
        provider: drone
        target: {pipeline: bm25-release, step: release}
        runner: docker
    depends_on: [ci]

  stable:
    default_provider: drone
    provider_target:
      pipeline: bm25-stable
      tag_prefix: stable-
    trigger:
      mode: manual
    stages:
      - name: stable
        provider: drone
        target: {pipeline: bm25-stable, step: stable}
        runner: docker
    depends_on: [release]
