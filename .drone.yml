kind: pipeline
type: docker
name: bm25-ci

trigger:
  branch:
    include:
      - main
      - "release/*"

steps:
  - name: configure
    image: gcc:13
    environment:
      VCPKG_ROOT: /drone/src/.vcpkg
    commands:
      - apt-get update
      - apt-get install -y --no-install-recommends ca-certificates curl git zip unzip tar pkg-config ninja-build cmake make
      - if [ ! -d "$VCPKG_ROOT/.git" ]; then git clone --depth=1 https://github.com/microsoft/vcpkg.git "$VCPKG_ROOT"; fi
      - "$VCPKG_ROOT/bootstrap-vcpkg.sh" -disableMetrics

  - name: build
    image: gcc:13
    environment:
      VCPKG_ROOT: /drone/src/.vcpkg
      BUILD_DIR: build
    commands:
      - apt-get update
      - apt-get install -y --no-install-recommends ca-certificates curl git zip unzip tar pkg-config ninja-build cmake make
      - if [ ! -x "$VCPKG_ROOT/vcpkg" ]; then "$VCPKG_ROOT/bootstrap-vcpkg.sh" -disableMetrics; fi
      - make build
    depends_on: [configure]

  - name: test
    image: gcc:13
    environment:
      VCPKG_ROOT: /drone/src/.vcpkg
      BUILD_DIR: build
    commands:
      - apt-get update
      - apt-get install -y --no-install-recommends ca-certificates curl git zip unzip tar pkg-config ninja-build cmake make
      - if [ ! -x "$VCPKG_ROOT/vcpkg" ]; then "$VCPKG_ROOT/bootstrap-vcpkg.sh" -disableMetrics; fi
      - make test
    depends_on: [build]

  - name: lint
    image: gcc:13
    environment:
      VCPKG_ROOT: /drone/src/.vcpkg
      BUILD_DIR: build
    commands:
      - apt-get update
      - apt-get install -y --no-install-recommends ca-certificates curl git zip unzip tar pkg-config ninja-build cmake make clang-tidy clang-format
      - if [ ! -x "$VCPKG_ROOT/vcpkg" ]; then "$VCPKG_ROOT/bootstrap-vcpkg.sh" -disableMetrics; fi
      - make lint
    depends_on: [build]
